<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Activity Report</title>
<style>
  :root{
    --navy:#0b3d62; --blue:#1f6fa8; --sky:#3aa6d8; --ink:#1a2733;
    --paper:#f4f7f9; --line:#d7e2e8; --amber:#e8932c; --ok:#2f8f5b; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Segoe UI', system-ui, Roboto, Arial, sans-serif; background:var(--paper); color:var(--ink); -webkit-tap-highlight-color:transparent;}
  .topbar{background:linear-gradient(120deg,var(--navy),var(--blue) 70%,var(--sky)); color:#fff; padding:16px 18px 14px; position:sticky; top:0; z-index:20; box-shadow:0 4px 14px rgba(11,61,98,.25);}
  .topbar .brand{font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.85; font-weight:600;}
  .topbar h1{margin:2px 0 0; font-size:18px; font-weight:700;}
  .topbar .sub{font-size:12px; opacity:.85; margin-top:2px;}
  .backbtn{background:rgba(255,255,255,.16); border:none; color:#fff; padding:7px 12px; border-radius:8px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:6px; margin-bottom:10px;}
  main{padding:14px 14px 90px; max-width:680px; margin:0 auto;}
  .loading{display:flex; align-items:center; justify-content:center; gap:10px; padding:60px 0; color:#5b6b75;}
  .spinner{width:22px; height:22px; border:3px solid #d7e2e8; border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .fab{position:fixed; bottom:20px; right:20px; z-index:30; background:var(--amber); color:#fff; border:none; width:56px; height:56px; border-radius:50%; font-size:28px; line-height:56px; text-align:center; box-shadow:0 6px 18px rgba(232,147,44,.5);}
  .empty{text-align:center; padding:60px 20px; color:#5b6b75;}
  .empty .icon{font-size:42px; margin-bottom:10px;}
  .empty h3{margin:0 0 6px; color:var(--navy);}
  .listcard{background:var(--card); border-radius:14px; padding:14px 14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(20,40,60,.07); border:1px solid var(--line); display:flex; gap:12px; align-items:center;}
  .listcard .ic{width:44px; height:44px; border-radius:10px; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  .listcard .info{flex:1; min-width:0;}
  .listcard .info .t{font-weight:700; font-size:15px; color:var(--navy);}
  .listcard .info .s{font-size:12.5px; color:#56697a; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .section{background:var(--card); border-radius:14px; padding:14px 16px 16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(20,40,60,.06); border:1px solid var(--line);}
  .section h2{font-size:12.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--blue); margin:0 0 10px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .section h2::before{content:''; width:4px; height:14px; background:var(--amber); border-radius:2px; display:inline-block;}
  .infobox{background:#eef5fa; border:1px solid #cfe3f0; border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px;}
  .infobox .row{display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px dashed #cfe3f0;}
  .infobox .row:last-child{border-bottom:none;}
  .infobox .row .k{color:#5b6b75; font-weight:600;}
  .infobox .row .v{color:var(--ink); font-weight:600; text-align:right; max-width:60%;}
  label{display:block; font-size:12px; color:#5b6b75; margin:10px 0 4px; font-weight:600;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date], input[type=number], textarea, select{width:100%; padding:10px 11px; border:1.4px solid var(--line); border-radius:9px; font-size:14.5px; font-family:inherit; background:#fbfdfe; color:var(--ink);}
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--blue); background:#fff;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .mp-row{display:grid; grid-template-columns:1fr 64px; gap:8px; margin-bottom:6px;}
  table.timetab{width:100%; border-collapse:collapse; font-size:13px;}
  table.timetab th{background:var(--navy); color:#fff; padding:7px 6px; font-size:11px; text-transform:uppercase;}
  table.timetab td{padding:6px 6px; border-bottom:1px solid var(--line);}
  table.timetab select{padding:6px 4px; font-size:13px;}
  .lineitem{border:1.4px solid var(--line); border-radius:10px; padding:10px; margin-bottom:8px; background:#fbfdfe; position:relative;}
  .lineitem .delbtn{position:absolute; top:6px; right:6px; background:#fdeaea; color:#c44; border:none; border-radius:7px; width:28px; height:28px; font-size:15px;}
  .lineitem .grid3{display:grid; grid-template-columns:2fr 1fr 1fr; gap:8px;}
  .addrow{background:#eaf2f8; color:var(--blue); border:none; border-radius:9px; padding:9px 14px; font-size:13px; font-weight:700; width:100%; margin-top:2px;}
  .saverbar{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:25; box-shadow:0 -4px 14px rgba(0,0,0,.06);}
  .btn{flex:1; padding:13px; border-radius:11px; border:none; font-size:14px; font-weight:700;}
  .btn.primary{background:var(--navy); color:#fff;} .btn.pdf{background:var(--amber); color:#fff;} .btn.secondary{background:#eaf2f8; color:var(--blue);}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--ok); color:#fff; padding:9px 18px; border-radius:24px; font-size:13px; font-weight:600; z-index:50; opacity:0; transition:opacity .25s;}
  .toast.show{opacity:1;} .toast.err{background:#c44;}
  .hint{font-size:11.5px; color:#8b9aa5; margin-top:4px;}
  .pagedots{display:flex; justify-content:center; gap:6px; margin:4px 0 14px;}
  .pagedots span{width:8px; height:8px; border-radius:50%; background:var(--line);}
  .pagedots span.active{background:var(--blue);}
  .photogrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .phototile{background:#fbfdfe; border:1.4px solid var(--line); border-radius:10px; overflow:hidden; position:relative;}
  .phototile img{width:100%; height:130px; object-fit:cover; display:block; background:#eee;}
  .phototile .capwrap{padding:6px 8px;}
  .phototile input{font-size:12px; padding:6px 8px; border-radius:7px;}
  .phototile .del{position:absolute; top:6px; right:6px; background:rgba(0,0,0,.55); color:#fff; border:none; width:26px; height:26px; border-radius:50%; font-size:14px;}
  .addphoto{border:2px dashed var(--line); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; height:130px; color:var(--blue); font-size:13px; font-weight:600; gap:4px; cursor:pointer; background:#f7fafc;}
  .addphoto .plus{font-size:26px;}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="brand">PT Salim Indokarya Pratama</div>
  <h1 id="topTitle">Daily Activity Report</h1>
  <div class="sub" id="topSub">Memuat...</div>
  <div id="homeLinkWrap" style="display:none; margin-top:6px;">
    <a href="#" onclick="loadJobs(); return false;" style="color:#fff; opacity:.9; font-size:12px; font-weight:700; text-decoration:underline;">🏠 Daftar Pekerjaan</a>
  </div>
</div>
<main id="app"><div class="loading"><div class="spinner"></div> Memuat...</div></main>
<div class="toast" id="toast"></div>

<script>
// PENTING: ganti URL di bawah ini dengan link Web App Apps Script kamu sendiri
const API_URL = 'https://script.google.com/macros/s/AKfycbyVyFs7hEcGDXFQY_3_hFnmwEyhiLNBTv7nMOCPBPke37X95UaUMXpY5F4JvqZrlDcb-w/exec';

let CURRENT_USER = null;
let state = { view:'jobs', job:null, jobInfo:null, reportId:null, reportData:null, formPage:1 };
const LS_KEY = 'dar_user_email';
const UOM_OPTIONS = ['Batang','Pc','Set','Kg','Liter','Sak','Lusin','Kotak','Lainnya'];

function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 1400);
}
function escapeAttr(s){ return (s||'').toString().replace(/"/g,'&quot;'); }
function setHomeLinkVisible(visible){
  const el = document.getElementById('homeLinkWrap');
  if(el) el.style.display = visible ? 'block' : 'none';
}
function removeBars(){ document.querySelectorAll('.fab, .saverbar').forEach(el=>el.remove()); }
function addFab(onClick){
  const fab = document.createElement('button');
  fab.className='fab'; fab.textContent='+'; fab.onclick = onClick;
  document.body.appendChild(fab);
}

// ---------------- SERVER CALL HELPER ----------------
function callServer(action, payload){
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload: payload || {} })
  }).then(r=>r.json()).then(res=>{
    if(!res.ok) throw new Error(res.error || 'Error tidak diketahui');
    return res.data;
  });
}

// ---------------- LOGIN ----------------
const savedEmail = localStorage.getItem(LS_KEY);
if(savedEmail){ tryLogin(savedEmail, true); } else { renderLogin(); }

function renderLogin(errMsg){
  document.getElementById('topSub').textContent = 'Masuk untuk melanjutkan';
  document.getElementById('app').innerHTML = `
    <div class="section" style="margin-top:30px;">
      <h2>Masuk</h2>
      <label>Email Gmail kamu (harus sudah didaftarkan admin)</label>
      <input type="text" id="loginEmail" placeholder="nama@gmail.com" autocomplete="email">
      ${errMsg ? `<div class="hint" style="color:#c44;margin-top:8px;">${errMsg}</div>` : ''}
      <button class="btn primary" style="width:100%;margin-top:14px;" onclick="submitLogin()">Masuk</button>
    </div>`;
}
function submitLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  if(!email){ toast('Isi email dulu', true); return; }
  tryLogin(email, false);
}
function tryLogin(email, silent){
  if(!silent) document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div> Memeriksa akses...</div>';
  callServer('checkAccessByEmail', { email }).then(user=>{
    if(!user.allowed){ localStorage.removeItem(LS_KEY); renderLogin('Email belum terdaftar. Hubungi admin.'); return; }
    CURRENT_USER = user;
    localStorage.setItem(LS_KEY, user.email);
    document.getElementById('topSub').innerHTML = 'Login sebagai: ' + (user.nama || user.email);
    loadJobs();
  }).catch(err=>{
    document.getElementById('app').innerHTML = '<div class="empty"><div class="icon">⚠️</div><h3>Gagal memuat</h3><p>'+err.message+'</p></div>';
  });
}

// ---------------- JOBS ----------------
function loadJobs(){
  state.view='jobs';
  document.getElementById('topTitle').textContent='Pilih Pekerjaan';
  setHomeLinkVisible(false);
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div> Memuat...</div>';
  removeBars();
  callServer('getJobs', { email: CURRENT_USER.email }).then(renderJobs).catch(e=>toast(e.message,true));
}
function renderJobs(jobs){
  const app = document.getElementById('app');
  if(jobs.length===0){
    app.innerHTML = '<div class="empty"><div class="icon">🛠️</div><h3>Belum ada pekerjaan</h3><p>Hubungi admin untuk menambahkan pekerjaan.</p></div>';
    return;
  }
  app.innerHTML = jobs.map(j=>`
    <div class="listcard" onclick="openJob('${escapeAttr(j)}')">
      <div class="ic">🛠️</div>
      <div class="info"><div class="t">${j}</div><div class="s">Ketuk untuk lihat laporan</div></div>
    </div>`).join('');
}
function openJob(job){
  state.job = job;
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div> Memuat info pekerjaan...</div>';
  callServer('getJobInfo', { email: CURRENT_USER.email, jobName: job }).then(info=>{
    state.jobInfo = info;
    loadReports();
  }).catch(e=>toast(e.message,true));
}

// ---------------- REPORTS LIST ----------------
function loadReports(){
  state.view='reports';
  document.getElementById('topTitle').textContent = state.job;
  setHomeLinkVisible(true);
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div> Memuat laporan...</div>';
  removeBars();
  callServer('getReportsSummary', { email: CURRENT_USER.email, jobName: state.job }).then(renderReports).catch(e=>toast(e.message,true));
}
function renderReports(reports){
  state.reportsList = reports;
  const app = document.getElementById('app');
  let html = `<button class="backbtn" onclick="loadJobs()">← Daftar Pekerjaan</button>`;
  html += infoBoxHtml_();
  if(reports.length===0){
    html += '<div class="empty"><div class="icon">📋</div><h3>Belum ada laporan</h3><p>Ketuk + untuk membuat laporan baru</p></div>';
  } else {
    html += reports.map(r=>`
      <div class="listcard" style="align-items:flex-start;">
        <div class="ic">${r.locked ? '🔒' : '📅'}</div>
        <div class="info" style="cursor:pointer;" onclick="openReport('${escapeAttr(r.id)}')">
          <div class="t">${r.tanggal} ${r.locked ? '<span style=\'color:#c44;font-size:11px;font-weight:700;\'>TERKUNCI</span>' : ''}</div>
          <div class="s">${r.activitySingkat}</div>
        </div>
        <button onclick="downloadPdf('${escapeAttr(r.id)}', this)" style="background:var(--amber); color:#fff; border:none; border-radius:8px; padding:8px 10px; font-size:11px; font-weight:700; flex-shrink:0;">⬇ PDF</button>
      </div>`).join('');
  }
  app.innerHTML = html;
  addFab(()=>{
    const todayStr = new Date().toISOString().slice(0,10);
    const existing = (state.reportsList || []).find(r => r.tanggal === todayStr);
    if(existing){
      toast(existing.locked ? 'Laporan hari ini sudah ada & terkunci' : 'Laporan hari ini sudah ada, lanjutkan saja', existing.locked);
      openReport(existing.id);
      return;
    }
    state.reportId = null;
    state.reportData = blankReport();
    state.formPage = 1;
    state.locked = false;
    renderForm();
  });
}
function loadJsPDF(){
  return new Promise((resolve, reject)=>{
    if(window.jspdf){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    const timer = setTimeout(()=>reject(new Error('Timeout memuat library PDF, cek koneksi internet')), 15000);
    script.onload = ()=>{ clearTimeout(timer); resolve(); };
    script.onerror = ()=>{ clearTimeout(timer); reject(new Error('Gagal memuat library PDF')); };
    document.head.appendChild(script);
  });
}

async function downloadPdf(id, btnEl){
  const originalText = btnEl ? btnEl.textContent : '';
  if(btnEl){ btnEl.textContent = '...'; btnEl.disabled = true; }
  toast('Menyiapkan PDF...');
  try{
    await loadJsPDF();
    const [report, info] = await Promise.all([
      callServer('getReport', { email: CURRENT_USER.email, jobName: state.job, id }),
      state.jobInfo ? Promise.resolve(state.jobInfo) : callServer('getJobInfo', { email: CURRENT_USER.email, jobName: state.job })
    ]);
    if(!report) throw new Error('Laporan tidak ditemukan');
    await buildAndDownloadPdf_(report, info);
    toast('PDF berhasil didownload');
  } catch(e){
    toast('Gagal buat PDF: '+e.message, true);
  } finally {
    if(btnEl){ btnEl.textContent = originalText; btnEl.disabled = false; }
  }
}

async function buildAndDownloadPdf_(report, info){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 30;
  const contentW = pageW - margin*2;
  let y = 32;

  function setNavy(){ doc.setTextColor(11,61,98); }
  function setInk(){ doc.setTextColor(30,40,50); }
  function setWhite(){ doc.setTextColor(255,255,255); }

  // Header
  doc.setFont('helvetica','bold'); doc.setFontSize(11); setNavy();
  doc.text('PT. SALIM INDOKARYA PRATAMA', margin, y);
  y += 4;
  doc.setDrawColor(11,61,98); doc.setLineWidth(1.3); doc.line(margin, y, pageW-margin, y);
  y += 14;

  doc.setFont('helvetica','bold'); doc.setFontSize(10); setInk();
  doc.text('DAILY ACTIVITY REPORT', pageW/2, y, {align:'center'});
  y += 13;

  // Identitas: label : value, kolom sejajar
  const labelW1 = 78;
  function identRow(label, value){
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); setInk();
    doc.text(label, margin, y);
    doc.text(':', margin+labelW1, y);
    doc.setFont('helvetica','normal');
    doc.text(String(value||'-'), margin+labelW1+8, y);
    y += 9.5;
  }
  identRow('No. BQ', info.bq);
  identRow('Judul', info.judul);
  identRow('Lokasi', info.platLoc);
  identRow('PIC', info.pic);
  identRow('Userplant', info.userplant);
  identRow('Site Manager', info.actionBy);
  identRow('PM Salim', info.pmSalim);
  identRow('Tanggal Laporan', report.tanggal);
  y += 4;

  // Helper: bar judul section (navy bg + putih), opsional teks kanan
  function sectionBar(x, w, title, rightText){
    doc.setFillColor(11,61,98); doc.rect(x, y, w, 11, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); setWhite();
    doc.text(title.toUpperCase(), x+4, y+7.5);
    if(rightText){
      doc.setFont('helvetica','normal'); doc.setFontSize(6.8);
      doc.text(rightText, x+w-4, y+7.5, {align:'right'});
    }
    return y + 11;
  }

  // Helper khusus Material/Consumable: nama di kiri (dipotong kalau kepanjangan),
  // qty+uom SELALU rata kanan (tidak akan tertimpa walau nama panjang)
  function nameValueRightAlignBox(x, w, yStart, rows){
    const rowH = 8.6;
    const list = rows.length ? rows : [['-','-']];
    const boxH = list.length * rowH + 4;
    doc.setDrawColor(215,226,232); doc.rect(x, yStart, w, boxH);
    const valueReserve = 56; // lebar area qty+uom di kanan
    let ry = yStart + 7;
    list.forEach(([name, value])=>{
      doc.setFont('helvetica','bold'); doc.setFontSize(6.8); setInk();
      let nameText = String(name);
      const maxNameW = w - valueReserve - 8;
      let truncated = doc.splitTextToSize(nameText, maxNameW)[0] || nameText;
      if(truncated !== nameText && truncated.length > 3){ truncated = truncated.slice(0, -2) + '..'; }
      doc.text(truncated, x+4, ry);
      doc.setFont('helvetica','normal');
      doc.text(String(value||'-'), x+w-4, ry, {align:'right'});
      ry += rowH;
    });
    return boxH;
  }

  // Helper: kotak label:value, return tinggi yg dipakai
  function labelValueBox(x, w, yStart, rows, labelW){
    const rowH = 8.6;
    const boxH = Math.max(rowH, rows.length * rowH) + 4;
    doc.setDrawColor(215,226,232); doc.rect(x, yStart, w, boxH);
    let ry = yStart + 7;
    rows.forEach(([label, value])=>{
      doc.setFont('helvetica','bold'); doc.setFontSize(6.8); setInk();
      doc.text(String(label), x+4, ry);
      doc.text(':', x+4+labelW, ry);
      doc.setFont('helvetica','normal');
      const valText = doc.splitTextToSize(String(value||'-'), w-(labelW+12));
      doc.text(valText[0]||'-', x+4+labelW+7, ry);
      ry += rowH;
    });
    return boxH;
  }

  // Helper: kotak bullet list, return tinggi
  function bulletBox(x, w, yStart, items){
    const rowH = 8.6;
    const list = (items && items.length) ? items : ['-'];
    const boxH = list.length * rowH + 4;
    doc.setDrawColor(215,226,232); doc.rect(x, yStart, w, boxH);
    let ry = yStart + 7;
    doc.setFont('helvetica','normal'); doc.setFontSize(6.8); setInk();
    list.forEach(txt=>{
      const lines = doc.splitTextToSize('- ' + txt, w-8);
      doc.text(lines[0]||'-', x+4, ry);
      ry += rowH;
    });
    return boxH;
  }

  // ---- Man Power | Jam Kerja ----
  const colW = (contentW - 8)/2;
  const colX2 = margin + colW + 8;
  const mpRows = [
    ['Safetyman', report.manpower.safetyman],
    ['Action Team', report.manpower.actionTeamQty],
    ['Foreman', report.manpower.foreman],
    ['Welder', report.manpower.welder],
    ['Fitter', report.manpower.fitter],
    ['Helper', report.manpower.helper]
  ];
  const timeLabels = [['T0700','07.00'],['T0800','08.00'],['T0900','09.00'],['T1000','10.00'],['T1100','11.00'],['T1200','12.00']];
  const timeLabels2 = [['T1300','13.00'],['T1400','14.00'],['T1500','15.00'],['T1600','16.00'],['T1700','17.00']];

  const yBar1 = y;
  const yMP = sectionBar(margin, colW, 'Man Power');
  sectionBar(colX2, colW, 'Jam Kerja');
  const yBoxStart = yMP;
  const mpBoxH = labelValueBox(margin, colW, yBoxStart, mpRows, 50);

  // Jam kerja: 2 sub-kolom dalam 1 box
  const jkRowH = 8.6;
  const jkRows = Math.max(timeLabels.length, timeLabels2.length) + (report.overtime ? 1 : 0);
  const jkBoxH = jkRows * jkRowH + 4;
  doc.setDrawColor(215,226,232); doc.rect(colX2, yBoxStart, colW, jkBoxH);
  let jkY = yBoxStart + 7;
  const subColW = colW/2;
  for(let i=0;i<timeLabels.length;i++){
    doc.setFont('helvetica','bold'); doc.setFontSize(6.8); setInk();
    doc.text(timeLabels[i][1], colX2+4, jkY);
    doc.text(':', colX2+4+28, jkY);
    doc.setFont('helvetica','normal');
    doc.text(report.time[timeLabels[i][0]]||'Continue', colX2+4+34, jkY);

    if(timeLabels2[i]){
      doc.setFont('helvetica','bold');
      doc.text(timeLabels2[i][1], colX2+subColW+4, jkY);
      doc.text(':', colX2+subColW+4+28, jkY);
      doc.setFont('helvetica','normal');
      doc.text(report.time[timeLabels2[i][0]]||'Continue', colX2+subColW+4+34, jkY);
    }
    jkY += jkRowH;
  }
  if(report.overtime){
    doc.setFont('helvetica','bold'); doc.setFontSize(6.8); setInk();
    doc.text('Overtime', colX2+4, jkY);
    doc.text(':', colX2+4+28, jkY);
    doc.setFont('helvetica','normal');
    doc.text(report.overtime + (report.overtimeRemark ? (' - '+report.overtimeRemark) : ''), colX2+4+34, jkY);
  }

  y = yBoxStart + Math.max(mpBoxH, jkBoxH) + 8;

  // ---- Material | Consumable ----
  const yBar2 = y;
  const yMat = sectionBar(margin, colW, 'Material');
  sectionBar(colX2, colW, 'Consumable');
  const matRows = (report.material||[]).filter(m=>m.name).map(m=>[m.name, (m.qty||'-') + ' ' + (m.uom||'')]);
  const consRows = (report.consumable||[]).filter(m=>m.name).map(m=>[m.name, (m.qty||'-') + ' ' + (m.uom||'')]);
  const matBoxH = nameValueRightAlignBox(margin, colW, yMat, matRows);
  const consBoxH = nameValueRightAlignBox(colX2, colW, yMat, consRows);
  y = yMat + Math.max(matBoxH, consBoxH) + 8;

  // ---- Activity (dengan progress di kanan) ----
  const progressText = 'Progress Hari Ini : ' + (report.progressHariIni||0) + '%   |   Progress Total : ' + (report.progressTotal||0) + '%';
  const yAct = sectionBar(margin, contentW, 'Activity', progressText);
  const actH = bulletBox(margin, contentW, yAct, report.activity);
  y = yAct + actH + 6;

  // ---- Problem ----
  const yProb = sectionBar(margin, contentW, 'Problem');
  const probH = bulletBox(margin, contentW, yProb, report.problem);
  y = yProb + probH + 6;

  // ---- Administrasi ----
  const yAdm = sectionBar(margin, contentW, 'Administrasi');
  const admH = bulletBox(margin, contentW, yAdm, report.administrasi);
  y = yAdm + admH + 14;

  // ---- Tanda tangan ----
  doc.setFont('helvetica','normal'); doc.setFontSize(7); setInk();
  doc.text('Prepared By,', margin, y);
  doc.text('Acknowledge By,', pageW-margin-120, y);
  y += 26;
  doc.text('Project Manager / Foreman', margin, y);
  doc.text('PIC Area Plant', pageW-margin-120, y);

  // ---- Halaman 2: Dokumentasi Foto ----
  const photos = report.photosJSON || [];
  if(photos.length > 0){
    doc.addPage();
    let py = 36;
    doc.setFont('helvetica','bold'); doc.setFontSize(12); setNavy();
    doc.text('DOKUMENTASI FOTO', pageW/2, py, {align:'center'});
    py += 18;
    const photoW = (contentW - 14)/2;
    const photoH = photoW * 0.7;
    let col = 0;
    for(const p of photos){
      let base64 = null;
      try{ base64 = await callServer('getPhotoBase64', { email: CURRENT_USER.email, fileId: p.fileId }); }catch(e){}
      if(py + photoH + 28 > doc.internal.pageSize.getHeight() - 36){ doc.addPage(); py = 36; col = 0; }
      const x = margin + col*(photoW+14);
      if(base64){ try{ doc.addImage(base64, 'JPEG', x, py, photoW, photoH); }catch(e){ doc.rect(x,py,photoW,photoH); } }
      else { doc.setDrawColor(200,200,200); doc.rect(x,py,photoW,photoH); doc.setFontSize(8); doc.text('Foto gagal dimuat', x+8, py+photoH/2); }
      doc.setFontSize(8); setInk();
      doc.text(doc.splitTextToSize(p.caption || '(tanpa caption)', photoW), x, py+photoH+12);
      col++;
      if(col>=2){ col=0; py += photoH+28; }
    }
  }

  const noBQ = String(info.bq || 'NoBQ').replace(/[^a-zA-Z0-9]/g,'');
  doc.save('PDF_' + noBQ + '_' + report.tanggal + '.pdf');
}

function infoBoxHtml_(){
  const i = state.jobInfo || {};
  const rows = [
    ['No. BQ', i.bq], ['Judul', i.judul], ['Lokasi', i.platLoc], ['PIC', i.pic],
    ['Userplant', i.userplant], ['Action By', i.actionBy], ['PM Salim', i.pmSalim],
    ['Tanggal Mulai', i.tanggalMulai], ['Est. Finish', i.estFinish]
  ];
  return `<div class="infobox">${rows.map(([k,v])=>`<div class="row"><span class="k">${k}</span><span class="v">${v||'-'}</span></div>`).join('')}</div>`;
}

function blankReport(){
  const time = {};
  ['T0700','T0800','T0900','T1000','T1100','T1200','T1300','T1400','T1500','T1600','T1700'].forEach(k=>time[k]='Continue');
  return {
    id:null, tanggal: new Date().toISOString().slice(0,10),
    manpower:{ safetyman:'', actionTeamQty:'', foreman:'', welder:'', fitter:'', helper:'' },
    material:[{name:'',qty:'',uom:'Batang'}], consumable:[{name:'',qty:'',uom:'Batang'}],
    activity:[''], problem:[''], administrasi:[''],
    time: time, overtime:'Continue', overtimeRemark:'',
    progressHariIni:'', photosJSON:[]
  };
}

function openReport(id){
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div> Memuat laporan...</div>';
  callServer('getReport', { email: CURRENT_USER.email, jobName: state.job, id }).then(data=>{
    if(!data){ toast('Laporan tidak ditemukan', true); loadReports(); return; }
    if(!data.material || data.material.length===0) data.material=[{name:'',qty:'',uom:'Batang'}];
    if(!data.consumable || data.consumable.length===0) data.consumable=[{name:'',qty:'',uom:'Batang'}];
    if(!data.activity || data.activity.length===0) data.activity=[''];
    if(!data.problem || data.problem.length===0) data.problem=[''];
    if(!data.administrasi || data.administrasi.length===0) data.administrasi=[''];
    state.reportId = id; state.reportData = data; state.formPage = 1; state.locked = !!data.locked;
    if(data.locked) toast('Laporan ini terkunci, hanya bisa dilihat', true);
    renderForm();
  }).catch(e=>toast(e.message,true));
}

// ---------------- SAVE ----------------
function save(showToast){
  clearTimeout(window._saveTimer);
  const data = state.reportData;
  const job = state.job;
  window._saveTimer = setTimeout(()=>{
    callServer('saveReport', { email: CURRENT_USER.email, jobName: job, data }).then(res=>{
      state.reportId = res.id; data.id = res.id;
      if(showToast) toast('Tersimpan ✓');
    }).catch(e=>{
      if(String(e.message).indexOf('DUPLICATE_DATE:') === 0){
        const existingId = e.message.split(':')[1];
        toast('Laporan tanggal ini sudah ada, membuka laporan tersebut...', true);
        openReport(existingId);
        return;
      }
      toast('Gagal simpan: '+e.message,true);
    });
  }, showToast ? 0 : 800);
}
function field(path, val){
  const parts = path.split('.');
  let obj = state.reportData;
  for(let i=0;i<parts.length-1;i++) obj = obj[parts[i]];
  obj[parts[parts.length-1]] = val;
  save(false);
}

// ---------------- LINE ITEMS (Material/Consumable/Activity/Problem/Administrasi) ----------------
function lineItemEdit(listName, i, key, val){
  if(key) state.reportData[listName][i][key] = val;
  else state.reportData[listName][i] = val;
  save(false);
}
function lineItemAdd(listName, template){
  const list = state.reportData[listName];
  if(list.length >= 10){ toast('Maksimal 10 item', true); return; }
  list.push(template);
  save(false); renderForm();
}
function lineItemRemove(listName, i){
  state.reportData[listName].splice(i,1);
  if(state.reportData[listName].length===0) state.reportData[listName].push(typeof state.reportData[listName==='material'?'material':'x'] === 'object' ? {name:'',qty:'',uom:'Batang'} : '');
  save(false); renderForm();
}

function materialConsumableHtml_(listName, label){
  const list = state.reportData[listName];
  return list.map((item,i)=>`
    <div class="lineitem">
      ${list.length>1?`<button class="delbtn" onclick="removeMatCons('${listName}',${i})">×</button>`:''}
      <label>${label} ${i+1}</label>
      <input type="text" placeholder="Nama ${label.toLowerCase()}" value="${escapeAttr(item.name)}" oninput="lineItemEdit('${listName}',${i},'name',this.value)">
      <div class="grid3" style="margin-top:8px;">
        <div></div>
        <input type="number" placeholder="Qty" value="${escapeAttr(item.qty)}" oninput="lineItemEdit('${listName}',${i},'qty',this.value)">
        <select onchange="lineItemEdit('${listName}',${i},'uom',this.value)">
          ${UOM_OPTIONS.map(u=>`<option value="${u}" ${item.uom===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
    </div>`).join('') + `<button class="addrow" onclick="addMatCons('${listName}')">+ Tambah ${label}</button>`;
}
function addMatCons(listName){ lineItemAdd(listName, {name:'',qty:'',uom:'Batang'}); }
function removeMatCons(listName, i){ lineItemRemove(listName, i); }

function textListHtml_(listName, label, placeholder){
  const list = state.reportData[listName];
  return list.map((val,i)=>`
    <div class="dyn-row" style="display:flex; gap:8px; margin-bottom:8px;">
      <input type="text" placeholder="${placeholder} ${i+1}" value="${escapeAttr(val)}" oninput="lineItemEdit('${listName}',${i},null,this.value)" style="flex:1;">
      ${list.length>1?`<button class="delbtn" style="position:static;width:38px;height:38px;" onclick="removeTextItem('${listName}',${i})">×</button>`:''}
    </div>`).join('') + `<button class="addrow" onclick="addTextItem('${listName}')">+ Tambah ${label}</button>`;
}
function addTextItem(listName){ lineItemAdd(listName, ''); }
function removeTextItem(listName, i){ lineItemRemove(listName, i); }

// ---------------- FORM RENDER ----------------
function renderForm(){
  document.getElementById('topTitle').textContent = state.job;
  removeBars();
  if(state.formPage===1) renderFormPage1(); else renderFormPage2();
  if(state.locked){
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#fdeaea;color:#c44;padding:10px 14px;border-radius:10px;font-weight:700;font-size:13px;margin-bottom:10px;text-align:center;';
    banner.textContent = '🔒 Laporan ini sudah DIKUNCI oleh admin - hanya bisa dilihat, tidak bisa diedit.';
    document.getElementById('app').prepend(banner);
    document.querySelectorAll('#app input, #app select, #app textarea, #app .addrow, #app .delbtn, #app .del, #app .addphoto').forEach(el=>{
      el.disabled = true; el.style.opacity = '0.6'; el.style.pointerEvents = 'none';
    });
  }
  addSaverBar();
}

function mpField(key, label){
  const r = state.reportData;
  return `<label>${label}</label><input type="text" value="${escapeAttr(r.manpower[key])}" oninput="field('manpower.${key}', this.value)">`;
}
function timeRow(t, label){
  const r = state.reportData;
  return `<tr><td>${label}</td><td>
    <select onchange="field('time.${t}', this.value)">
      <option value="Continue" ${r.time[t]==='Continue'?'selected':''}>Continue</option>
      <option value="Stop" ${r.time[t]==='Stop'?'selected':''}>Stop</option>
    </select></td></tr>`;
}

function renderFormPage1(){
  const r = state.reportData;
  document.getElementById('app').innerHTML = `
    <button class="backbtn" onclick="loadReports()">← Daftar Laporan</button>
    <div class="pagedots"><span class="active"></span><span></span></div>
    ${infoBoxHtml_()}

    <div class="section"><h2>Tanggal & Man Power</h2>
      <label>Tanggal</label>
      <input type="date" value="${r.tanggal}" onchange="field('tanggal', this.value)">
      ${mpField('safetyman','Safetyman')}
      <label>Action Team (Qty)</label>
      <input type="number" value="${escapeAttr(r.manpower.actionTeamQty)}" oninput="field('manpower.actionTeamQty', this.value)">
      ${mpField('foreman','Foreman')}
      ${mpField('welder','Welder')}
      ${mpField('fitter','Fitter')}
      ${mpField('helper','Helper')}
    </div>

    <div class="section"><h2>Material</h2>${materialConsumableHtml_('material','Material')}</div>
    <div class="section"><h2>Consumable</h2>${materialConsumableHtml_('consumable','Consumable')}</div>
    <div class="section"><h2>Activity</h2>${textListHtml_('activity','Activity','Activity')}</div>
    <div class="section"><h2>Problem</h2>${textListHtml_('problem','Problem','Problem')}</div>
    <div class="section"><h2>Administrasi</h2>${textListHtml_('administrasi','Administrasi','Administrasi')}</div>

    <div class="section"><h2>Jam Kerja</h2>
      <table class="timetab">
        <tr><th style="text-align:left">Jam</th><th style="text-align:left">Status</th></tr>
        ${timeRow('T0700','07.00')}${timeRow('T0800','08.00')}${timeRow('T0900','09.00')}${timeRow('T1000','10.00')}${timeRow('T1100','11.00')}${timeRow('T1200','12.00')}
        ${timeRow('T1300','13.00')}${timeRow('T1400','14.00')}${timeRow('T1500','15.00')}${timeRow('T1600','16.00')}${timeRow('T1700','17.00')}
      </table>
      <label style="margin-top:14px;">Overtime</label>
      <select onchange="field('overtime', this.value)">
        <option value="Continue" ${r.overtime==='Continue'?'selected':''}>Continue</option>
        <option value="Stop" ${r.overtime==='Stop'?'selected':''}>Stop</option>
      </select>
      <label>Keterangan Overtime</label>
      <input type="text" value="${escapeAttr(r.overtimeRemark)}" oninput="field('overtimeRemark', this.value)">
    </div>

    <div class="section"><h2>Progress Hari Ini</h2>
      <label>Progress (%)</label>
      <input type="number" min="0" max="100" value="${escapeAttr(r.progressHariIni)}" oninput="field('progressHariIni', this.value)">
      <div class="hint">Progress Total akan dihitung otomatis (akumulasi).</div>
    </div>
  `;
}

function renderFormPage2(){
  const r = state.reportData;
  const photos = r.photosJSON || [];
  document.getElementById('app').innerHTML = `
    <button class="backbtn" onclick="state.formPage=1; renderForm();">← Kembali ke Form</button>
    <div class="pagedots"><span></span><span class="active"></span></div>
    <div class="section">
      <h2>Foto Progress</h2>
      <div class="hint">Setiap foto wajib diberi keterangan. Nama file otomatis: NoBQ_tanggalupload.</div>
      <div class="photogrid" style="margin-top:10px;">
        ${photos.map((p,i)=>`
          <div class="phototile">
            <img src="https://drive.google.com/thumbnail?id=${p.fileId}&sz=w400" />
            <button class="del" onclick="removePhoto(${i})">×</button>
            <div class="capwrap"><input type="text" placeholder="Caption..." value="${escapeAttr(p.caption)}" oninput="editCaption(${i}, this.value)"></div>
          </div>`).join('')}
        <label class="addphoto">
          <div class="plus">＋</div><div>Tambah Foto</div>
          <input type="file" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
        </label>
      </div>
    </div>`;
}
function editCaption(i, val){ state.reportData.photosJSON[i].caption = val; save(false); }
function removePhoto(i){
  const p = state.reportData.photosJSON[i];
  state.reportData.photosJSON.splice(i,1);
  save(false); renderFormPage2();
  if(p && p.fileId) callServer('deletePhoto', { email: CURRENT_USER.email, fileId: p.fileId });
}
function handlePhotoSelect(evt){
  const file = evt.target.files[0];
  if(!file) return;
  toast('Mengompres foto...');
  compressImageAdaptive(file, 700*1024).then(dataUrl=>{
    toast('Mengupload foto...');
    callServer('uploadPhoto', { email: CURRENT_USER.email, jobName: state.job, reportId: state.reportId, base64Data: dataUrl, caption: '' })
      .then(res=>{
        state.reportData.photosJSON.push({ fileId: res.fileId, caption: '' });
        save(true); renderFormPage2();
      }).catch(e=>toast('Gagal upload: '+e.message, true));
  });
}
function compressImage(file, maxDim, quality){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
// Kompresi bertahap: turunkan dimensi & kualitas sampai ukuran base64 di bawah targetBytes,
// supaya tidak memenuhi kuota Drive walau foto asli dari kamera HP sangat besar.
async function compressImageAdaptive(file, targetBytes){
  const attempts = [
    {maxDim:1280, quality:0.72}, {maxDim:1000, quality:0.65}, {maxDim:800, quality:0.6},
    {maxDim:640, quality:0.55}, {maxDim:480, quality:0.5}
  ];
  let result = null;
  for(const a of attempts){
    result = await compressImage(file, a.maxDim, a.quality);
    const approxBytes = result.length * 0.75; // estimasi ukuran biner dari panjang base64
    if(approxBytes <= targetBytes) break;
  }
  return result;
}

// ---------------- UI BARS ----------------
function addSaverBar(){
  document.querySelectorAll('.saverbar').forEach(b=>b.remove());
  const bar = document.createElement('div');
  bar.className='saverbar';
  if(state.locked){
    bar.innerHTML = `<button class="btn primary" onclick="loadReports();">← Kembali ke Daftar</button>`;
  } else if(state.formPage===1){
    bar.innerHTML = `
      <button class="btn secondary" onclick="state.formPage=2; renderForm();">📷 Foto →</button>
      <button class="btn primary" onclick="save(true); loadReports();">Selesai</button>`;
  } else {
    bar.innerHTML = `
      <button class="btn secondary" onclick="state.formPage=1; renderForm();">← Form</button>
      <button class="btn primary" onclick="save(true); loadReports();">Selesai</button>`;
  }
  document.body.appendChild(bar);
}
</script>
